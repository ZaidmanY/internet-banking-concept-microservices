spring:
  config:
    import: ""
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
eureka:
  client:
    enabled: false
app:
  config:
    keycloak:
      server-url: http://localhost:8080
      realm: test-realm
      clientId: test-client
      client-secret: test-secret
